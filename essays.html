---
layout: default
title: Essays Archive
permalink: /essays/
---

<div class="archive-page">
  <div class="section-label">ESSAYS</div>
  <hr class="section-rule">
  <div class="archive-list">
    {% assign essays_posts = site.posts | where: "category", "essays" %}
    {% for post in essays_posts %}
    <a href="{{ post.url | relative_url }}" class="front-block story-block">
      <h3 class="story-block-title">{{ post.title }}</h3>
      <p class="story-block-excerpt">{{ post.excerpt | strip_html | truncatewords: 18 }}</p>
    </a>
    {% endfor %}
  </div>
</div>
